<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma de Entregas — Regatec</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-base: #0f1115;
    --bg-panel: #1a1d24;
    --bg-card: #232730;
    --bg-card-hover: #2a2f3a;
    --border-soft: #2d323d;
    --border-strong: #3a4150;

    --text-primary: #f5f7fa;
    --text-secondary: #c4cad4;
    --text-muted: #8b93a3;

    --accent-green: #00c853;
    --accent-green-dim: #1a3d28;

    --status-none: #5a6473;
    --status-pending: #e53935;
    --status-confirmed: #fdd835;
    --status-delivered: #00c853;

    --past-overlay: rgba(8, 10, 14, 0.72);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Faixa decorativa verde lateral esquerda */
  body::before {
    content: '';
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: linear-gradient(180deg, var(--accent-green) 0%, var(--accent-green) 60%, transparent 100%);
    z-index: 100;
  }

  /* ====================================================
     CABEÇALHO COMPACTO (uma linha só)
     ==================================================== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px 10px 24px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg-panel);
    flex-shrink: 0;
    gap: 20px;
    min-height: 64px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
    flex: 1;
    min-width: 0;
  }

  .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .title-accent {
    color: var(--accent-green);
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 16px;
    border-left: 2px solid var(--border-strong);
    flex-shrink: 0;
  }

  .nav-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--text-secondary);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .nav-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-green);
    color: var(--accent-green);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .nav-btn svg {
    width: 18px;
    height: 18px;
  }

  .week-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 200px;
    line-height: 1.1;
  }

  .week-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .week-value.past { color: var(--text-muted); }
  .week-value.future { color: #80d8ff; }
  .week-value.current { color: var(--accent-green); }

  .week-range {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: capitalize;
    white-space: nowrap;
    margin-top: 2px;
  }

  .week-badge {
    font-size: 9px;
    font-weight: 800;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-left: 6px;
  }

  .week-badge.past { background: var(--text-muted); color: #0a0c10; }
  .week-badge.future { background: #80d8ff; color: #0a0c10; }
  .week-badge.current { background: var(--accent-green); color: #0a0c10; }

  /* Legenda compacta no cabeçalho */
  .legend {
    display: flex;
    gap: 14px;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    white-space: nowrap;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .update-btn {
    background: var(--accent-green);
    color: #0a0c10;
    border: none;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
    font-family: inherit;
    white-space: nowrap;
  }

  .update-btn:hover { background: #00e676; }
  .update-btn.loading { pointer-events: none; opacity: 0.7; }
  .update-btn.loading .icon { animation: spin 1s linear infinite; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .icon { width: 14px; height: 14px; display: inline-block; }

  /* Logo da Regatec — fundo claro sutil para dar contraste no tema escuro */
  .logo {
    height: 50px;
    padding: 4px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(255,255,255,0.97) 0%, rgba(245,250,245,0.97) 100%);
    border-radius: 8px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.4);
  }

  .logo img {
    height: 100%;
    width: auto;
    display: block;
  }

  .last-update {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .pulse-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* ====================================================
     GRADE PRINCIPAL — máximo espaço para os dias
     ==================================================== */
  .schedule-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    overflow: hidden;
    background: var(--bg-base);
  }

  .day-column {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border-soft);
    overflow: hidden;
    position: relative;
    min-width: 0;
  }

  .day-column:last-child { border-right: none; }

  .day-header {
    padding: 10px 10px 8px;
    background: var(--bg-panel);
    border-bottom: 2px solid var(--border-soft);
    text-align: center;
    flex-shrink: 0;
    position: relative;
  }

  .day-header.today {
    background: linear-gradient(180deg, var(--accent-green-dim) 0%, var(--bg-panel) 100%);
    border-bottom-color: var(--accent-green);
  }

  .day-name {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    line-height: 1;
  }

  .day-header.today .day-name { color: var(--accent-green); }

  .day-date {
    font-size: 24px;
    font-weight: 800;
    margin-top: 4px;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .today-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--accent-green);
    color: #0a0c10;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .day-cards {
    flex: 1;
    overflow: hidden;
    padding: 8px 6px;
    display: grid;
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    min-height: 0;
  }

  /* ====================================================
     CARDS DE ENTREGA — grid interno controlado
     Status (auto) / Obra (auto) / Infos (1fr) — sem sobreposição
     ==================================================== */
  .delivery-card {
    background: var(--bg-card);
    border-radius: 8px;
    padding: 10px 14px 12px;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 6px;
    min-height: 0;
    overflow: hidden;
    transition: all 0.25s ease;
    animation: cardIn 0.4s ease-out backwards;
    position: relative;
    border-top: 5px solid var(--status-none);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .delivery-card.status-none { border-top-color: var(--status-none); }
  .delivery-card.status-pending {
    border-top-color: var(--status-pending);
    background: linear-gradient(180deg, rgba(229, 57, 53, 0.15) 0%, var(--bg-card) 40%);
  }
  .delivery-card.status-confirmed {
    border-top-color: var(--status-confirmed);
    background: linear-gradient(180deg, rgba(253, 216, 53, 0.15) 0%, var(--bg-card) 40%);
  }
  .delivery-card.status-delivered {
    border-top-color: var(--status-delivered);
    background: linear-gradient(180deg, rgba(0, 200, 83, 0.15) 0%, var(--bg-card) 40%);
    opacity: 0.9;
  }

  /* Badge de status no topo */
  .status-badge {
    justify-self: start;
    font-size: clamp(12px, 1vw, 20px);
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #0a0c10;
    white-space: nowrap;
    line-height: 1.2;
  }

  .status-none .status-badge { background: var(--status-none); color: var(--text-primary); }
  .status-pending .status-badge { background: var(--status-pending); color: #fff; }
  .status-confirmed .status-badge { background: var(--status-confirmed); }
  .status-delivered .status-badge { background: var(--status-delivered); }

  /* Nome da obra — limitado a 1 linha com ellipsis */
  .card-obra {
    font-size: clamp(18px, 1.7vw, 32px);
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.15;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  /* Container das informações ocupa o restante do espaço */
  .card-info {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 6px;
    min-height: 0;
    overflow: hidden;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(14px, 1.15vw, 22px);
    color: var(--text-secondary);
    line-height: 1.3;
    min-width: 0;
  }

  .info-icon {
    width: clamp(16px, 1.3vw, 24px);
    height: clamp(16px, 1.3vw, 24px);
    flex-shrink: 0;
    color: var(--text-muted);
  }

  .info-text {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .info-text strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  .empty-day {
    grid-row: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-muted);
    font-size: clamp(12px, 1vw, 18px);
    font-style: italic;
    opacity: 0.5;
  }

  /* ====================================================
     WIDGET DE PREVISÃO DO TEMPO — canto superior direito
     Posicionamento absoluto não afeta o grid do card
     ==================================================== */
  .weather-widget {
    position: absolute;
    top: 8px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    padding: 3px 8px 3px 6px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    z-index: 2;
  }

  .weather-widget.loaded { opacity: 1; }

  .weather-icon {
    width: clamp(20px, 1.8vw, 32px);
    height: clamp(20px, 1.8vw, 32px);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .weather-icon svg {
    width: 100%;
    height: 100%;
  }

  .weather-info {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    gap: 1px;
  }

  .weather-temp {
    font-size: clamp(12px, 1vw, 18px);
    font-weight: 800;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .weather-rain {
    font-size: clamp(9px, 0.75vw, 13px);
    font-weight: 600;
    color: #80d8ff;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .weather-rain.high { color: #4fc3f7; }
  .weather-rain.zero { display: none; }

  /* Cores específicas para diferentes condições */
  .weather-icon.sunny { color: #ffb300; }
  .weather-icon.cloudy { color: #b0bec5; }
  .weather-icon.rainy { color: #4fc3f7; }
  .weather-icon.stormy { color: #7e57c2; }
  .weather-icon.snowy { color: #e0e0e0; }
  .weather-icon.foggy { color: #90a4ae; }

  /* OVERLAY DIAS PASSADOS */
  .day-column.past::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--past-overlay);
    pointer-events: none;
    z-index: 5;
  }

  .day-column.past .day-header {
    filter: grayscale(0.4);
  }

  /* TOAST DE ERRO */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg-card);
    border: 1px solid var(--status-pending);
    border-left: 4px solid var(--status-pending);
    padding: 12px 18px;
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    z-index: 1000;
    transform: translateX(120%);
    transition: transform 0.3s ease;
    max-width: 340px;
  }

  .toast.show { transform: translateX(0); }
  .toast.success { border-color: var(--accent-green); border-left-color: var(--accent-green); }

  /* TELA DE CARREGAMENTO */
  .overlay-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-base);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 999;
    gap: 20px;
  }

  .overlay-screen.hidden { display: none; }

  .spinner {
    width: 56px;
    height: 56px;
    border: 4px solid var(--border-strong);
    border-top-color: var(--accent-green);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .overlay-text {
    font-size: 18px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ====================================================
     AJUSTES PARA TELAS GRANDES (TV Full HD e 4K)
     Cards usam clamp() — escalam fluidos sozinhos.
     Aqui ajustamos só cabeçalho e cabeçalho dos dias.
     ==================================================== */
  @media (min-width: 1600px) {
    header { min-height: 72px; padding: 12px 24px 12px 28px; }
    .title { font-size: 26px; }
    .week-value { font-size: 18px; }
    .week-range { font-size: 13px; }
    .legend-item { font-size: 12px; }
    .day-name { font-size: 14px; }
    .day-date { font-size: 28px; }
    .logo { height: 56px; }
    .update-btn { font-size: 13px; padding: 9px 16px; }
    .nav-btn { width: 36px; height: 36px; }
  }

  @media (min-width: 1920px) {
    header { min-height: 80px; }
    .title { font-size: 30px; }
    .week-value { font-size: 20px; }
    .week-range { font-size: 14px; }
    .day-date { font-size: 32px; }
    .logo { height: 60px; }
  }

  @media (min-width: 2400px) {
    .title { font-size: 36px; }
    .day-date { font-size: 40px; }
    .logo { height: 72px; }
  }

  /* ====================================================
     LAYOUT MOBILE (celular e tablet pequeno - até 768px)
     A grade horizontal vira lista vertical com abas de dia
     ==================================================== */
  @media (max-width: 768px) {
    html, body {
      height: auto;
      min-height: 100%;
      overflow: auto !important;
      overflow-x: hidden;
    }
    body {
      display: block;
    }

    /* Cabeçalho reorganizado em duas linhas para caber */
    header {
      flex-direction: column;
      align-items: stretch;
      padding: 8px 12px 8px 16px;
      gap: 8px;
      min-height: auto;
    }
    .header-left {
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
    }
    .title { font-size: 18px; }
    .week-nav {
      padding-left: 0;
      border-left: none;
      gap: 6px;
      width: 100%;
      justify-content: center;
      order: 3;
      padding-top: 6px;
      border-top: 1px solid var(--border-soft);
    }
    .week-info { min-width: 130px; }
    .week-value { font-size: 14px; }
    .week-range { font-size: 11px; }
    .week-badge { font-size: 8px; padding: 1px 4px; }
    .nav-btn { width: 38px; height: 38px; } /* maior para tap-target */
    .nav-btn svg { width: 20px; height: 20px; }

    /* Legenda escondida no celular (badges nos cards já cumprem o papel) */
    .legend { display: none; }

    .header-right {
      gap: 8px;
      justify-content: space-between;
      width: 100%;
    }
    .last-update { font-size: 10px; flex: 1; }
    .update-btn { font-size: 11px; padding: 8px 12px; min-height: 38px; }
    .logo { height: 38px; padding: 3px 8px; }

    /* Grade vira lista vertical, uma coluna por vez */
    .schedule-grid {
      grid-template-columns: 1fr !important;
      overflow-y: visible !important;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: block !important;
      height: auto !important;
    }
    .day-column {
      border-right: none;
      border-bottom: 2px solid var(--border-soft);
      min-height: auto;
      height: auto !important;
      overflow: visible !important;
      flex: none !important;
    }
    .day-column.past::after {
      /* Histórico no celular: menos escuro, ainda dá pra ler */
      background: rgba(8, 10, 14, 0.45);
    }

    .day-header {
      padding: 10px 14px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 4;
    }
    .day-name {
      font-size: 13px;
      flex: 1;
    }
    .day-date {
      font-size: 18px;
      margin-top: 0;
    }
    .today-badge {
      position: static;
      align-self: center;
    }

    /* Cards: lista completa por dia (sem limite de 3 do desktop) */
    .day-cards {
      display: flex !important;
      flex-direction: column;
      grid-template-rows: none !important;
      padding: 8px 10px 12px;
      gap: 8px;
      overflow: visible;
      min-height: auto !important;
      height: auto !important;
    }
    .delivery-card {
      padding: 12px 14px 14px;
      border-top-width: 4px;
      border-radius: 8px;
      /* Sobrescreve o grid de altura fixa do desktop */
      display: flex !important;
      flex-direction: column;
      gap: 8px;
      height: auto !important;
      min-height: auto !important;
    }

    /* Fontes maiores para leitura à distância de braço */
    .card-obra { font-size: 17px; white-space: normal; }
    .status-badge { font-size: 11px; padding: 3px 9px; }
    .info-row { font-size: 14px; }
    .info-icon { width: 16px; height: 16px; }

    /* Previsão: tamanho confortável no celular.
       Posicionada abaixo da faixa colorida do status, sobre a área cinza */
    .weather-widget {
      top: 42px;
      right: 10px;
      padding: 4px 8px 4px 6px;
    }
    .weather-icon { width: 24px; height: 24px; }
    .weather-temp { font-size: 13px; }
    .weather-rain { font-size: 10px; }

    /* Empty day mais compacto */
    .empty-day {
      padding: 16px;
      font-size: 13px;
    }

    /* Toast em posição melhor para celular */
    .toast {
      bottom: 12px;
      left: 12px;
      right: 12px;
      max-width: none;
      font-size: 13px;
    }
  }

  /* Telas muito pequenas (celulares antigos ou em modo paisagem estreita) */
  @media (max-width: 380px) {
    .title { font-size: 15px; }
    .card-obra { font-size: 15px; }
    .info-row { font-size: 13px; }
    .header-right { flex-wrap: wrap; }
  }

  /* Aproveita espaço melhor em paisagem no celular */
  @media (max-width: 900px) and (orientation: landscape) {
    .schedule-grid {
      grid-template-columns: repeat(2, 1fr) !important;
    }
  }
</style>
<!-- ============================================================
     CONFIGURAÇÃO PWA (Progressive Web App)
     Permite "instalar" o painel no celular como se fosse um app
     ============================================================ -->

function getDateOffset(daysFromMondayOfWeek, weekOffset) {
  const today = new Date();
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  monday.setDate(today.getDate() + diff + (weekOffset * 7));
  monday.setHours(0, 0, 0, 0);
  const target = new Date(monday);
  target.setDate(monday.getDate() + daysFromMondayOfWeek);
  return formatDateBR(target);
}

function formatDateBR(date) {
  const d = String(date.getDate()).padStart(2, '0');
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const y = date.getFullYear();
  return `${d}/${m}/${y}`;
}

/* ============================================================
   PARSER DE CSV
   ============================================================ */
function parseCSV(text) {
  const lines = [];
  let current = [];
  let field = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { current.push(field); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (field !== '' || current.length > 0) {
          current.push(field);
          lines.push(current);
          current = [];
          field = '';
        }
        if (ch === '\r' && next === '\n') i++;
      } else { field += ch; }
    }
  }
  if (field !== '' || current.length > 0) {
    current.push(field);
    lines.push(current);
  }
  return lines.filter(row => row.some(cell => cell.trim() !== ''));
}

function rowsToObjects(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => normalizeKey(h));
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
    return obj;
  });
}

function normalizeKey(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]/g, '');
}

/* ============================================================
   STATUS E DATAS
   ============================================================ */
function normalizeStatus(s) {
  const v = (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
  if (!v) return 'none';
  if (v.includes('entreg') || v.includes('finaliz') || v.includes('concluid')) return 'delivered';
  if (v.includes('a confirmar') || v.includes('pendent') || v.includes('aguard')) return 'pending';
  if (v.includes('confirm')) return 'confirmed';
  return 'none';
}

function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  let m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m) {
    const d = parseInt(m[1]);
    const mo = parseInt(m[2]) - 1;
    let y = parseInt(m[3]);
    if (y < 100) y += 2000;
    const date = new Date(y, mo, d);
    if (!isNaN(date)) return date;
  }
  m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) {
    const date = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
    if (!isNaN(date)) return date;
  }
  const date = new Date(str);
  return isNaN(date) ? null : date;
}

/* ============================================================
   LÓGICA DA SEMANA
   ============================================================ */
function getWeekStart(date = new Date()) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function getViewedWeekStart() {
  const ws = getWeekStart();
  ws.setDate(ws.getDate() + (viewedWeekOffset * 7));
  return ws;
}

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

const DAY_NAMES = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
const MONTH_NAMES_SHORT = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];

  renderHeader();

/* ============================================================
   RENDERIZAÇÃO DO CABEÇALHO
   ============================================================ */
function renderHeader() {
  const weekStart = getViewedWeekStart();
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);

  const weekValue = document.getElementById('week-value');
  const weekBadge = document.getElementById('week-badge');
  const weekRange = document.getElementById('week-range');

  weekValue.firstChild.textContent = `Semana ${getWeekNumber(weekStart)}`;

  // Badge indicando se é passado, atual ou futuro
  weekValue.classList.remove('past', 'current', 'future');
  if (viewedWeekOffset === 0) {
    weekValue.classList.add('current');
    weekBadge.className = 'week-badge current';
    weekBadge.textContent = 'Atual';
  } else if (viewedWeekOffset < 0) {
    weekValue.classList.add('past');
    weekBadge.className = 'week-badge past';
    weekBadge.textContent = 'Histórico';
  } else {
    weekValue.classList.add('future');
    weekBadge.className = 'week-badge future';
    weekBadge.textContent = 'Futuro';
  }

  const startStr = `${String(weekStart.getDate()).padStart(2, '0')} ${MONTH_NAMES_SHORT[weekStart.getMonth()]}`;
  const endStr = `${String(weekEnd.getDate()).padStart(2, '0')} ${MONTH_NAMES_SHORT[weekEnd.getMonth()]}`;
  weekRange.textContent = `${startStr} – ${endStr} · ${weekEnd.getFullYear()}`;

  // Habilita/desabilita botão "voltar para hoje"
  document.getElementById('today-btn').disabled = (viewedWeekOffset === 0);
}

/* ============================================================
   RENDERIZAÇÃO DA GRADE
   ============================================================ */
function renderGrid(deliveries) {
  const grid = document.getElementById('schedule-grid');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const weekStart = getViewedWeekStart();

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    days.push(d);
  }

  // Mostrar sábado/domingo só se tiverem entregas
  const weekendHasDeliveries = deliveries.some(del => {
    const dt = parseDate(del.data);
    if (!dt) return false;
    return isSameDay(dt, days[5]) || isSameDay(dt, days[6]);
  });
  const visibleDays = weekendHasDeliveries ? days : days.slice(0, 5);
  grid.style.gridTemplateColumns = `repeat(${visibleDays.length}, 1fr)`;

  grid.innerHTML = '';

  visibleDays.forEach((day, idx) => {
    const isToday = isSameDay(day, today);
    const isPast = day < today;

    const col = document.createElement('div');
    col.className = 'day-column' + (isPast ? ' past' : '');

    const head = document.createElement('div');
    head.className = 'day-header' + (isToday ? ' today' : '');
    head.innerHTML = `
      <div class="day-name">${DAY_NAMES[idx]}</div>
      <div class="day-date">${String(day.getDate()).padStart(2, '0')}/${String(day.getMonth() + 1).padStart(2, '0')}</div>
      ${isToday ? '<div class="today-badge">Hoje</div>' : ''}
    `;
    col.appendChild(head);

    const cardsContainer = document.createElement('div');
    cardsContainer.className = 'day-cards';

    // No celular (largura ≤ 768px), mostra TODAS as entregas do dia.
    // Na TV/desktop, limita a 3 para preservar o layout fixo.
    const isMobile = window.innerWidth <= 768;
    const limite = isMobile ? Infinity : 3;

    // Ordem de prioridade dos status na tela:
    // 1º confirmado (amarelo), 2º a confirmar (vermelho), 3º entregue (verde), 4º sem status (cinza)
    const STATUS_PRIORITY = { confirmed: 1, pending: 2, delivered: 3, none: 4 };

    const dayDeliveries = deliveries
      .filter(del => {
        const dt = parseDate(del.data);
        return dt && isSameDay(dt, day);
      })
      .sort((a, b) => {
        const pa = STATUS_PRIORITY[normalizeStatus(a.status)] || 99;
        const pb = STATUS_PRIORITY[normalizeStatus(b.status)] || 99;
        return pa - pb;
      })
      .slice(0, limite); // limite varia: TV=3, celular=todas

    if (dayDeliveries.length === 0) {
      cardsContainer.innerHTML = '<div class="empty-day">Sem entregas</div>';
    } else {
      dayDeliveries.forEach((del, i) => {
        cardsContainer.appendChild(renderCard(del, i));
      });
    }

    col.appendChild(cardsContainer);
    grid.appendChild(col);
  });

  // Carrega previsão do tempo em segundo plano (não bloqueia a renderização)
  if (typeof loadWeatherForCards === 'function') {
    setTimeout(loadWeatherForCards, 100);
  }
}

/* ============================================================
   PREVISÃO DO TEMPO (Open-Meteo — API gratuita, sem chave)
   ============================================================
   Cache em duas camadas:
   - Coordenadas (cidade → lat/lon): permanente em localStorage
   - Previsão (cidade+data → tempo): 6 horas em localStorage

   Para ver o que está acontecendo nas buscas, abra o Console
   do navegador (F12) — todos os passos são logados.
   ============================================================ */
const WEATHER_CACHE_HOURS = 6;
const GEOCODE_CACHE_KEY = 'cronograma_geocode_cache';
const WEATHER_CACHE_KEY = 'cronograma_weather_cache';
const WEATHER_DEBUG = true; // mostra mensagens no Console (F12) para diagnóstico

function wlog(...args) { if (WEATHER_DEBUG) console.log('%c[Tempo]', 'color:#00c853;font-weight:bold', ...args); }
function wwarn(...args) { if (WEATHER_DEBUG) console.warn('%c[Tempo]', 'color:#ffb300;font-weight:bold', ...args); }

// Gera variações de busca para uma localidade.
// Ex: "Tamboré, Barueri" → ["Tamboré, Barueri", "Barueri", "Tamboré"]
// Ex: "Alphaville, SP"   → ["Alphaville, SP", "Alphaville", "Alphaville Barueri"]
function buildSearchVariations(localidade) {
  if (!localidade) return [];
  const orig = localidade.trim();
  const parts = orig.split(',').map(p => p.trim()).filter(Boolean);
  const variations = [];

  // 1ª: localidade exata como veio
  variations.push(orig);

  if (parts.length >= 2) {
    const last = parts[parts.length - 1];
    const prev = parts[parts.length - 2];

    // 2ª: última parte (geralmente a cidade)
    if (!/^[A-Z]{2}$/i.test(last)) {
      variations.push(last);
    } else {
      // Se a última é UF, tenta penúltima + UF e penúltima sozinha
      variations.push(`${prev}, ${last.toUpperCase()}`);
      variations.push(prev);
    }

    // 3ª: penúltima parte sozinha (caso seja a cidade real, ex: bairros conhecidos)
    if (parts.length >= 3 || (parts.length === 2 && !/^[A-Z]{2}$/i.test(last))) {
      variations.push(prev);
    }
  }

  // Remove duplicatas mantendo ordem
  return [...new Set(variations)];
}

// Cache helpers
function readCache(key) {
  try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) { return {}; }
}
function writeCache(key, obj) {
  try { localStorage.setItem(key, JSON.stringify(obj)); } catch(e) {}
}

// Geocoding com estratégia em cascata
async function geocodeLocalidade(localidade) {
  if (!localidade) return null;

  const cache = readCache(GEOCODE_CACHE_KEY);

  // Resultado em cache positivo
  if (cache[localidade] && cache[localidade].lat) {
    return cache[localidade];
  }
  // Resultado em cache negativo recente (menos de 24h) — evita retentar toda hora
  if (cache[localidade] && cache[localidade].failed) {
    const horas = (Date.now() - cache[localidade].failed) / 3600000;
    if (horas < 24) return null;
  }

  const variations = buildSearchVariations(localidade);
  wlog(`Geocoding "${localidade}" → tentando variações:`, variations);

  for (const v of variations) {
    // Tenta primeiro com filtro Brasil, depois sem
    for (const filtro of ['&country=BR', '']) {
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=1&language=pt&format=json${filtro}`;
        const res = await fetch(url);
        if (!res.ok) continue;
        const data = await res.json();
        if (data.results && data.results.length > 0) {
          const r = data.results[0];
          const coords = {
            lat: r.latitude,
            lon: r.longitude,
            nomeEncontrado: `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}${r.country ? ' (' + r.country + ')' : ''}`,
            queryUsada: v
          };
          cache[localidade] = coords;
          writeCache(GEOCODE_CACHE_KEY, cache);
          wlog(`✓ "${localidade}" encontrado como "${coords.nomeEncontrado}" (busca: "${v}")`);
          return coords;
        }
      } catch (err) {
        wwarn(`Falha ao buscar "${v}":`, err.message);
      }
    }
  }

  // Não achou em nenhuma variação — registra falha
  cache[localidade] = { failed: Date.now() };
  writeCache(GEOCODE_CACHE_KEY, cache);
  wwarn(`✗ Nenhuma variação de "${localidade}" foi reconhecida pelo serviço.`);
  return null;
}

// Busca previsão para uma localidade em uma data específica
async function fetchWeather(localidade, dateStr) {
  if (!localidade || !dateStr) return null;

  const cacheKey = `${localidade}__${dateStr}`;
  const cache = readCache(WEATHER_CACHE_KEY);
  const cached = cache[cacheKey];
  if (cached && (Date.now() - cached.timestamp) < WEATHER_CACHE_HOURS * 3600 * 1000) {
    return cached.data;
  }

  const coords = await geocodeLocalidade(localidade);
  if (!coords) return null;

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}` +
                `&daily=weather_code,temperature_2m_max,precipitation_probability_max` +
                `&timezone=America/Sao_Paulo&start_date=${dateStr}&end_date=${dateStr}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Weather HTTP ' + res.status);
    const data = await res.json();
    if (!data.daily || !data.daily.time || data.daily.time.length === 0) return null;

    const weather = {
      code: data.daily.weather_code[0],
      tempMax: Math.round(data.daily.temperature_2m_max[0]),
      rainChance: data.daily.precipitation_probability_max[0] || 0
    };

    cache[cacheKey] = { data: weather, timestamp: Date.now() };
    writeCache(WEATHER_CACHE_KEY, cache);
    return weather;
  } catch (err) {
    wwarn(`Falha ao buscar previsão de ${localidade} em ${dateStr}:`, err.message);
    return null;
  }
}

// Converte código WMO em ícone SVG + classe de cor
// Códigos: https://open-meteo.com/en/docs (WMO Weather interpretation codes)
function weatherCodeToIcon(code) {
  // Sol limpo / pouca nuvem
  if (code === 0 || code === 1) {
    return {
      cls: 'sunny',
      svg: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></g></svg>'
    };
  }
  // Parcialmente nublado
  if (code === 2) {
    return {
      cls: 'sunny',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3" fill="currentColor" stroke="none"/><path d="M8 4v1M8 13v1M3 9h1M12 9h0.5M4.5 5.5l0.7 0.7M11.5 5.5l-0.7 0.7" stroke-width="1.5"/><path d="M22 16a4 4 0 0 0-4-4 5 5 0 0 0-9.5 1.5A3.5 3.5 0 0 0 9 20h9a4 4 0 0 0 4-4z" fill="#b0bec5" stroke="#90a4ae"/></svg>'
    };
  }
  // Nublado
  if (code === 3) {
    return {
      cls: 'cloudy',
      svg: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 16.9c0 2.3-1.9 4.1-4.2 4.1H7c-2.8 0-5-2.2-5-5 0-2.4 1.7-4.5 4.1-4.9C6.6 8.1 9 6 12 6c3.2 0 5.9 2.4 6.3 5.5 2 .4 3.7 2.2 3.7 4.4 0 1.7-1 3.1-2.5 3.7"/></svg>'
    };
  }
  // Neblina/névoa
  if (code === 45 || code === 48) {
    return {
      cls: 'foggy',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="10" x2="18" y2="10"/><line x1="6" y1="14" x2="21" y2="14"/><line x1="3" y1="18" x2="18" y2="18"/></svg>'
    };
  }
  // Garoa
  if (code >= 51 && code <= 57) {
    return {
      cls: 'rainy',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 16.9c0 2.3-1.9 4.1-4.2 4.1" fill="currentColor" opacity="0.3"/><path d="M19 13.9c0-2.3-1.9-4.1-4.2-4.1-.6-2.3-2.7-4-5.1-4-3 0-5.4 2.4-5.4 5.4 0 .3 0 .6.1.9" fill="currentColor"/><line x1="8" y1="19" x2="8" y2="22"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="16" y1="19" x2="16" y2="22"/></svg>'
    };
  }
  // Chuva
  if (code >= 61 && code <= 67) {
    return {
      cls: 'rainy',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 13.9c0-2.3-1.9-4.1-4.2-4.1-.6-2.3-2.7-4-5.1-4-3 0-5.4 2.4-5.4 5.4 0 .3 0 .6.1.9" fill="currentColor"/><line x1="8" y1="17" x2="8" y2="22"/><line x1="12" y1="17" x2="12" y2="22"/><line x1="16" y1="17" x2="16" y2="22"/></svg>'
    };
  }
  // Neve
  if (code >= 71 && code <= 77) {
    return {
      cls: 'snowy',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 13.9c0-2.3-1.9-4.1-4.2-4.1-.6-2.3-2.7-4-5.1-4-3 0-5.4 2.4-5.4 5.4 0 .3 0 .6.1.9" fill="currentColor"/><circle cx="8" cy="20" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/><circle cx="16" cy="20" r="1" fill="currentColor"/></svg>'
    };
  }
  // Pancadas/aguaceiros
  if (code >= 80 && code <= 82) {
    return {
      cls: 'rainy',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 13.9c0-2.3-1.9-4.1-4.2-4.1-.6-2.3-2.7-4-5.1-4-3 0-5.4 2.4-5.4 5.4 0 .3 0 .6.1.9" fill="currentColor"/><line x1="8" y1="17" x2="6" y2="22"/><line x1="13" y1="17" x2="11" y2="22"/><line x1="18" y1="17" x2="16" y2="22"/></svg>'
    };
  }
  // Tempestade
  if (code >= 95) {
    return {
      cls: 'stormy',
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 13.9c0-2.3-1.9-4.1-4.2-4.1-.6-2.3-2.7-4-5.1-4-3 0-5.4 2.4-5.4 5.4 0 .3 0 .6.1.9" fill="currentColor"/><polyline points="13,14 11,18 14,18 12,22" fill="#fdd835" stroke="#fdd835"/></svg>'
    };
  }
  // Padrão (nublado)
  return {
    cls: 'cloudy',
    svg: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 16.9c0 2.3-1.9 4.1-4.2 4.1H7c-2.8 0-5-2.2-5-5 0-2.4 1.7-4.5 4.1-4.9C6.6 8.1 9 6 12 6c3.2 0 5.9 2.4 6.3 5.5 2 .4 3.7 2.2 3.7 4.4 0 1.7-1 3.1-2.5 3.7"/></svg>'
  };
}

// ============================================================
// Utilitários acessíveis pelo Console (F12) para diagnosticar
// problemas de previsão do tempo:
//
//   diagWeather()            → mostra status do cache e widgets
//   resetWeatherCache()      → limpa cache e força nova busca
//   testCidade("Barueri")    → testa busca de uma cidade
// ============================================================
window.diagWeather = function() {
  const geo = readCache(GEOCODE_CACHE_KEY);
  const prev = readCache(WEATHER_CACHE_KEY);
  const widgets = document.querySelectorAll('.weather-widget[data-localidade]');
  const reconhecidas = Object.entries(geo).filter(([k,v]) => v.lat);
  const naoReconhecidas = Object.entries(geo).filter(([k,v]) => v.failed);

  console.log('%c=== DIAGNÓSTICO PREVISÃO DO TEMPO ===', 'color:#00c853;font-weight:bold;font-size:14px');
  console.log(`Total de cards com previsão pedida: ${widgets.length}`);
  console.log(`Localidades reconhecidas: ${reconhecidas.length}`);
  reconhecidas.forEach(([loc, v]) => {
    console.log(`  ✓ "${loc}" → ${v.nomeEncontrado || `${v.lat}, ${v.lon}`} (buscou: "${v.queryUsada || loc}")`);
  });
  console.log(`Localidades NÃO reconhecidas: ${naoReconhecidas.length}`);
  naoReconhecidas.forEach(([loc, v]) => {
    const horas = ((Date.now() - v.failed) / 3600000).toFixed(1);
    console.log(`  ✗ "${loc}" (falhou há ${horas}h)`);
  });
  console.log(`Previsões em cache: ${Object.keys(prev).length}`);
};

window.resetWeatherCache = function() {
  localStorage.removeItem(GEOCODE_CACHE_KEY);
  localStorage.removeItem(WEATHER_CACHE_KEY);
  console.log('%c[Tempo] Cache limpo. Recarregando previsões...', 'color:#00c853;font-weight:bold');
  loadWeatherForCards();
};

window.testCidade = async function(localidade) {
  console.log(`%c[Tempo] Testando "${localidade}"...`, 'color:#00c853;font-weight:bold');
  // Remove do cache para forçar nova busca
  const cache = readCache(GEOCODE_CACHE_KEY);
  delete cache[localidade];
  writeCache(GEOCODE_CACHE_KEY, cache);
  const result = await geocodeLocalidade(localidade);
  if (result) {
    console.log(`✓ Encontrado: ${result.nomeEncontrado}`);
    console.log(`  Coordenadas: ${result.lat}, ${result.lon}`);
    console.log(`  Variação usada: "${result.queryUsada}"`);
  } else {
    console.log(`✗ Não encontrado em nenhuma variação`);
  }
  return result;
};

// Carrega previsão para todos os cards visíveis (assíncrono, em segundo plano)
async function loadWeatherForCards() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const widgets = document.querySelectorAll('.weather-widget[data-localidade][data-iso]');
  let total = 0, ok = 0, fail = 0;
  for (const w of widgets) {
    total++;
    const localidade = w.getAttribute('data-localidade');
    const iso = w.getAttribute('data-iso');
    const dataEntrega = new Date(iso + 'T00:00:00');

    // Só busca previsão para hoje ou futuro
    if (dataEntrega < today) continue;

    // Open-Meteo só prevê até 16 dias à frente
    const diasFrente = Math.floor((dataEntrega - today) / (1000 * 60 * 60 * 24));
    if (diasFrente > 16) continue;

    const tempo = await fetchWeather(localidade, iso);
    if (!tempo) { fail++; continue; }
    ok++;

    const icon = weatherCodeToIcon(tempo.code);
    const rainCls = tempo.rainChance === 0 ? 'zero' : (tempo.rainChance >= 50 ? 'high' : '');
    w.innerHTML = `
      <div class="weather-icon ${icon.cls}">${icon.svg}</div>
      <div class="weather-info">
        <span class="weather-temp">${tempo.tempMax}°</span>
        <span class="weather-rain ${rainCls}">💧 ${tempo.rainChance}%</span>
      </div>
    `;
    w.classList.add('loaded');
  }
  if (total > 0) {
    wlog(`Previsão carregada em ${ok}/${total} cards (${fail} sem dados disponíveis).`);
  }
}

/* ============================================================
   CARREGAMENTO DE DADOS
   ============================================================ */
async function loadData() {
  const btn = document.getElementById('update-btn');
  btn.classList.add('loading');

  try {
    let data;

    if (CONFIG.SHEET_CSV_URL && CONFIG.SHEET_CSV_URL.trim() !== '') {
      const res = await fetch(CONFIG.SHEET_CSV_URL, { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);
      const objects = rowsToObjects(rows);
      data = objects.map(o => ({
        obra: o.obracliente || o.obra || o.cliente || '',
        empreiteiro: o.empreiteiro || o.empreiteiroresponsavel || o.responsavel || '',
        motorista: o.motorista || o.condutor || o.entregador || '',
        localidade: o.localidade || o.local || o.endereco || '',
        carga: o.carga || o.material || o.descricao || '',
        data: o.data || o.dataentrega || o.datadaentrega || '',
        status: o.status || o.statusdaentrega || ''
      }));
      try { localStorage.setItem('cronograma_cache', JSON.stringify({ data, timestamp: Date.now() })); } catch(e) {}
    } else if (CONFIG.USE_DEMO_DATA) {
      data = DEMO_DATA;
    } else {
      throw new Error('Planilha não configurada');
    }

    cachedData = data;
    renderHeader();
    renderGrid(data);
    updateLastUpdateTime();
    showToast('Programação atualizada', 'success');

  } catch (err) {
    console.error('Erro ao carregar:', err);
    try {
      const cached = localStorage.getItem('cronograma_cache');
      if (cached) {
        const { data, timestamp } = JSON.parse(cached);
        cachedData = data;
        renderHeader();
        renderGrid(data);
        const minutes = Math.floor((Date.now() - timestamp) / 60000);
        showToast(`Sem conexão. Cache de ${minutes} min atrás.`, 'error');
      } else if (CONFIG.USE_DEMO_DATA) {
        cachedData = DEMO_DATA;
        renderHeader();
        renderGrid(DEMO_DATA);
        showToast('Erro ao carregar. Exibindo demonstração.', 'error');
      } else {
        showToast('Erro ao carregar: ' + err.message, 'error');
      }
    } catch (e) {
      showToast('Erro ao carregar: ' + err.message, 'error');
    }
  } finally {
    btn.classList.remove('loading');
    document.getElementById('loading-screen').classList.add('hidden');
  }
}

function updateLastUpdateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('last-update-time').textContent = `${h}:${m}`;
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (type === 'success' ? 'success' : '');
  setTimeout(() => { toast.classList.remove('show'); }, 3500);
}

/* ============================================================
   AUTO-REFRESH E RESET SEMANAL
   ============================================================ */
let lastWeekStart = null;

function checkWeekChange() {
  const currentWeekStart = getWeekStart().getTime();
  if (lastWeekStart !== null && lastWeekStart !== currentWeekStart) {
    // Virou a semana — volta para a semana atual e recarrega
    viewedWeekOffset = 0;
    location.reload();
  }
  lastWeekStart = currentWeekStart;
}

/* ============================================================
   FULLSCREEN
   ============================================================ */
function tryFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'F11' || (e.key === 'f' && !e.ctrlKey && !e.metaKey)) {
    e.preventDefault();
    tryFullscreen();
  }
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey) loadData();
  if (e.key === 'ArrowLeft') changeWeek(-1);
  if (e.key === 'ArrowRight') changeWeek(1);
  if (e.key === 'Home') goToToday();
});

// Não aciona fullscreen automático no celular (o PWA já cuida disso)
if (window.innerWidth > 768) {
  document.addEventListener('click', tryFullscreen, { once: true });
}

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
window.addEventListener('load', () => {
  renderHeader();
  loadData();
  lastWeekStart = getWeekStart().getTime();

  if (CONFIG.AUTO_REFRESH_MINUTES > 0) {
    setInterval(loadData, CONFIG.AUTO_REFRESH_MINUTES * 60 * 1000);
  }
  setInterval(() => {
    renderHeader();
    checkWeekChange();
  }, 60000);
});
</script>
